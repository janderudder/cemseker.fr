<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Cem Seker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="facebook-domain-verification" content="lamxvh85okksmfe4fn1646wnz653o3" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #020617, var(--bg));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      max-width: 520px;
      width: 100%;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0.5rem 0;
      line-height: 1.5;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    footer {
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <h1>Cem Seker</h1>

      <p>Activité professionnelle de location de logement meublé à usage de courte durée.</p>

      <p class="muted">
        Contact :
        <a href="mailto:contact@cemseker.fr">contact@cemseker.fr</a>
      </p>

      <p class="muted">France</p>

      <hr>

      <footer>
        Éditeur du site : Cem Seker<br>
      </footer>
    </section>
  </main>
</body>
</html>
